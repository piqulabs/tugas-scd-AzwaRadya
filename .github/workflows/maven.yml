name: Build Project dan Simulasi CD

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Continuous Integration (Build and Test)
      run: mvn verify

    - name: Simulate Continuous Deployment
      run: |
        echo "========================================="
        echo "Build & Test sukses! Memulai proses Deployment..."
        echo "Mendistribusikan aplikasi ke server production..."
        echo "Restarting services..."
        echo "Deployment Berhasil Selesai!"
        echo "========================================="